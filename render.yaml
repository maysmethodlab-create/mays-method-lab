services:
  - type: web
    name: mays-method-lab
    runtime: node
    plan: starter
    buildCommand: npm install && node scripts/_scrape-academic-calendar.mjs && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.1
